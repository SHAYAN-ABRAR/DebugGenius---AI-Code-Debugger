# Base theme so Streamlit's own widgets match the injected glassmorphism CSS
# (deep-space backdrop, violet→sky duotone).
[theme]
base = "dark"
primaryColor = "#7C6CFF"
backgroundColor = "#070810"
secondaryBackgroundColor = "#0E1120"
textColor = "#EEF0FA"
font = "sans serif"

[client]
toolbarMode = "minimal"

[server]
# Don't auto-open a browser tab when running headless / on a server.
headless = true
